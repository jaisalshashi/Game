<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Paint Duel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#0b0b0b;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

.navbar{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
background:#151515;
}

.logo{
font-size:20px;
font-weight:700;
color:#00ffc3;
}

.roomBox{
display:flex;
gap:10px;
}

.roomBox input{
padding:6px;
border-radius:6px;
border:none;
}

.roomBox button{
padding:6px 10px;
border:none;
border-radius:6px;
background:#00ffc3;
cursor:pointer;
}

.stage{
flex:1;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

canvas{
background:white;
width:90%;
max-width:900px;
height:70vh;
border-radius:12px;
}

.toolbox{
position:absolute;
left:20px;
top:50%;
transform:translateY(-50%);
background:#1b1b1b;
padding:12px;
border-radius:10px;
display:flex;
flex-direction:column;
gap:8px;
}

.toolbox button,
.toolbox input{
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;
}

.chatPanel{
position:fixed;
right:-320px;
top:0;
width:300px;
height:100%;
background:#151515;
padding:15px;
transition:0.3s;
display:flex;
flex-direction:column;
}

.chatPanel.open{
right:0;
}

#chatBox{
flex:1;
overflow:auto;
margin-bottom:10px;
font-size:14px;
}

.chatPanel input{
padding:8px;
border:none;
border-radius:6px;
margin-bottom:8px;
}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">Paint Duel</div>

<div class="roomBox">

<input id="roomInput" placeholder="Room name">

<button onclick="joinRoom()">Join</button>

<button onclick="toggleChat()">Chat</button>

</div>

</div>

<div class="stage">

<canvas id="board"></canvas>

<div class="toolbox">

<button onclick="setTool('pencil')">Pencil</button>
<button onclick="setTool('brush')">Brush</button>
<button onclick="setTool('eraser')">Eraser</button>

<button onclick="clearCanvas()">Clear</button>
<button onclick="downloadImage()">Download</button>

<input type="color" id="color">
<input type="range" id="size" min="1" max="30" value="5">

</div>

</div>

<div class="chatPanel" id="chatPanel">

<div id="chatBox"></div>

<input id="chatInput" placeholder="message">

<button onclick="sendMsg()">Send</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

/* FIREBASE CONFIG */

var firebaseConfig={
apiKey:"AIzaSyCAIp4w4wRHaK_gyDTjsCjBqA50a9fO-2w",
authDomain:"game-a9b52.firebaseapp.com",
databaseURL:"https://game-a9b52-default-rtdb.firebaseio.com",
projectId:"game-a9b52"
};

firebase.initializeApp(firebaseConfig);

let db=firebase.database();

let room="";
let drawRef;
let chatRef;
let playerName="";

/* ROOM JOIN CODE */

function joinRoom(){

room=document.getElementById("roomInput").value.trim();

if(!room){
alert("Enter room name");
return;
}

drawRef=db.ref(room+"/draw");
chatRef=db.ref(room+"/chat");

let playerRef=db.ref(room+"/players");

playerRef.once("value",(snap)=>{

let count=snap.val()||0;

if(count>=2){
alert("Room full");
return;
}

playerName="Player "+(count+1);

playerRef.set(count+1);

});

/* DRAW SYNC */

drawRef.on("child_added",(data)=>{

let d=data.val();

ctx.strokeStyle=d.c;
ctx.lineWidth=d.s;

ctx.beginPath();
ctx.moveTo(d.lx,d.ly);
ctx.lineTo(d.x,d.y);
ctx.stroke();

});

/* CHAT SYNC */

chatRef.on("child_added",(data)=>{

let msg=data.val();

let box=document.getElementById("chatBox");

box.innerHTML+="<b>"+msg.player+":</b> "+msg.text+"<br>";

box.scrollTop=box.scrollHeight;

});

}

/* CANVAS */

const canvas=document.getElementById("board");
const ctx=canvas.getContext("2d");

canvas.width=900;
canvas.height=500;

let drawing=false;
let lastX=0;
let lastY=0;

let currentTool="brush";

function setTool(tool){
currentTool=tool;
}

canvas.addEventListener("mousedown",(e)=>{
drawing=true;
lastX=e.offsetX;
lastY=e.offsetY;
});

canvas.addEventListener("mouseup",()=>drawing=false);

canvas.addEventListener("mousemove",(e)=>{
if(!drawing) return;
drawLine(e.offsetX,e.offsetY);
});

function drawLine(x,y){

if(!room) return;

let color=document.getElementById("color").value;
let size=document.getElementById("size").value;

ctx.lineCap="round";

if(currentTool==="pencil"){ctx.lineWidth=1; ctx.strokeStyle=color;}
if(currentTool==="brush"){ctx.lineWidth=size; ctx.strokeStyle=color;}
if(currentTool==="eraser"){ctx.lineWidth=size*2; ctx.strokeStyle="#ffffff";}

ctx.beginPath();
ctx.moveTo(lastX,lastY);
ctx.lineTo(x,y);
ctx.stroke();

drawRef.push({
lx:lastX,
ly:lastY,
x:x,
y:y,
c:ctx.strokeStyle,
s:ctx.lineWidth
});

lastX=x;
lastY=y;

}

function clearCanvas(){
ctx.clearRect(0,0,canvas.width,canvas.height);
drawRef.remove();
}

function downloadImage(){

let link=document.createElement("a");

link.download="drawing.png";

link.href=canvas.toDataURL();

link.click();

}

function sendMsg(){

let text=document.getElementById("chatInput").value;

chatRef.push({
player:playerName,
text:text
});

document.getElementById("chatInput").value="";

}

function toggleChat(){
document.getElementById("chatPanel").classList.toggle("open");
}

</script>

</body>
</html>
